services:
  db:
    image: postgres:15-alpine
    container_name: kpi-db
    hostname: db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: kpi_system
      POSTGRES_USER: kpi_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kpi_user -d kpi_system"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - kpi-network

  metabase:
    image: metabase/metabase:latest
    container_name: kpi-metabase
    hostname: metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: kpi_system
      MB_DB_PORT: 5432
      MB_DB_USER: kpi_user
      MB_DB_PASS: ${DB_PASSWORD}
      MB_DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - kpi-network

  backend:
    build: ./backend
    container_name: kpi-backend
    hostname: backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://kpi_user:${DB_PASSWORD}@db:5432/kpi_system
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=True
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "sleep 5 && python manage.py migrate && gunicorn --bind 0.0.0.0:8000 --workers 2 --access-logfile - --error-logfile - --capture-output --log-level info backend.wsgi:application"
    networks:
      - kpi-network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: kpi-frontend
    hostname: frontend
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - kpi-network

networks:
  kpi-network:
    driver: bridge

volumes:
  postgres_data:
